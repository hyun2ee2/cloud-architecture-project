name: Deploy

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 설치
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: gradlew 권한 추가
        run: chmod +x gradlew

      - name: 빌드
        run: ./gradlew build

      - name: Docker 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker 이미지 빌드
        run: docker build -t hyun2ee/ca-project .

      - name: Docker Hub push
        run: docker push hyun2ee/ca-project

      - name: EC2 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull hyun2ee/ca-project

            docker stop ca-project || true
            docker rm ca-project || true

            docker run -d -p 8080:8080 \
            --name ca-project \
            -e SPRING_CLOUD_AWS_S3_BUCKET=test-bucket \
            hyun2ee/ca-project