name: Deploy

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 설치
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: gradlew 권한 추가
        run: chmod +x gradlew

      - name: 빌드
        run: ./gradlew build

      - name: Docker 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # buildx 설치
      - name: Docker buildx setup
        uses: docker/setup-buildx-action@v3

      # ARM + AMD 둘 다 빌드
      - name: Docker 이미지 빌드 및 Push
        run: |
          docker buildx build \
          --platform linux/amd64,linux/arm64 \
          -t hyun2ee/ca-project \
          --push .

      - name: EC2 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull hyun2ee/ca-project

            docker rm -f ca-project || true

            docker run -d -p 8080:8080 \
            --name ca-project \
            -e SPRING_CLOUD_AWS_S3_BUCKET=test-bucket \
            -e SPRING_PROFILES_ACTIVE=prod \
            hyun2ee/ca-project