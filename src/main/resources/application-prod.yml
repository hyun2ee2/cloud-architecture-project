spring:
  config:
    import: "aws-parameterstore:/ca-project/prod/"

  cloud:
    aws:
      region:
        static: ap-northeast-2
      s3:
        bucket: ca-project-hong2ee2-files


  datasource:
    url: ${db.url}
    username: ${db.username}
    password: ${db.password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

management:
  endpoint:
    info:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health, info
  info:
    env:
      enabled: true

info:
  app:
    team-name: ${team-name}
