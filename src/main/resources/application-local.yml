spring:
  config:
    import: "optional:aws-parameterstore:"
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  cloud:
    aws:
      region:
        static: ap-northeast-2
      s3:
        bucket: ca-project-hong2ee2-files

S3_BUCKET_NAME: test-bucket
APP_MESSAGE: local-test
TEAM-NAME: local-team